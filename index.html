<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portail Officiel du Capitole</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Roboto:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(180deg,#f8f2e6,#efe3c0);
font-family:Roboto,sans-serif;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:#4b3a18;
}

.container{
text-align:center;
padding:20px;
max-width:900px;
}

h1{
font-family:'Cinzel',serif;
font-size:4rem;
letter-spacing:4px;
margin-bottom:15px;
}

.subtitle{
font-size:1.2rem;
margin-bottom:40px;
}

#countdown{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.time-box{
background:white;
padding:20px;
min-width:120px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.08);
}

.time{
font-size:2.5rem;
font-weight:bold;
color:#a67c00;
}

.label{
font-size:0.8rem;
letter-spacing:2px;
}

.logo{
font-size:6rem;
margin-bottom:20px;
}

#mockingjayHack{
position:fixed;
inset:0;
background:rgba(0,0,0,0.93);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:100;
opacity:0;
pointer-events:none;
transition:0.5s;
}

#mockingjayHack.active{
opacity:1;
}

#mockingjayHack img{
width:250px;
max-width:60vw;
margin-bottom:30px;
animation:pulse 2s infinite;
}

#hackText{
font-family:monospace;
color:#ff2b2b;
font-size:2rem;
text-align:center;
padding:20px;
letter-spacing:2px;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

.glitch{
animation:glitch 0.2s infinite;
}

@keyframes glitch{
0%{transform:translate(0);}
25%{transform:translate(3px,-2px);}
50%{transform:translate(-3px,2px);}
75%{transform:translate(2px,1px);}
100%{transform:translate(0);}
}

.footer{
margin-top:50px;
font-style:italic;
}

@media(max-width:700px){

h1{
font-size:2.5rem;
}

.logo{
font-size:4rem;
}

.time-box{
min-width:90px;
}

.time{
font-size:1.8rem;
}

}

</style>
</head>
<body>

<div class="container">

<div class="logo">
  <img src="The_Capitol_Seal.png" alt="Capitole">
</div>

<h1>LE CAPITOLE</h1>

<div class="subtitle">
Le Capitole vous souhaite la bienvenue.
</div>

<div id="countdown">

<div class="time-box">
<div class="time" id="days">00</div>
<div class="label">JOURS</div>
</div>

<div class="time-box">
<div class="time" id="hours">00</div>
<div class="label">HEURES</div>
</div>

<div class="time-box">
<div class="time" id="minutes">00</div>
<div class="label">MINUTES</div>
</div>

<div class="time-box">
<div class="time" id="seconds">00</div>
<div class="label">SECONDES</div>
</div>

</div>

<div class="footer">
Puisse le sort vous êtres favorable.
</div>

</div>

<div id="mockingjayHack">

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/79/Mockingjay.svg/512px-Mockingjay.svg.png">

<div id="hackText"></div>

</div>

<script>

const campDate = new Date("July 18, 2026 00:00:00").getTime();

setInterval(() => {

const now = new Date().getTime();
const distance = campDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("days").textContent=days;
document.getElementById("hours").textContent=hours;
document.getElementById("minutes").textContent=minutes;
document.getElementById("seconds").textContent=seconds;

},1000);

const messages=[

"LE GEAI MOQUEUR SURVIT",

"ALLIEZ-VOUS AU GEAI MOQUEUR",

"SNOW N'EST PAS ÉTERNEL",

"LA FLAMME CONTINUE DE BRÛLER",

"CERTAINES VÉRITÉS NE PEUVENT ÊTRE EFFACÉES",

"LE CAPITOLE N'ENTEND PAS TOUT",

"NOUS SOMMES PLUS PROCHES QUE VOUS NE LE CROYEZ",

"UNE ÉTINCELLE SUFFIT"

"LE SORT N'EST JAMAIS EN NOTRE FAVEUR"

"SI NOUS BRÛLONS, VOUS BRÛLEZ AVEC NOUS"

];

function hackEvent(){

const screen=document.getElementById("mockingjayHack");
const text=document.getElementById("hackText");

text.innerText=
messages[Math.floor(Math.random()*messages.length)];

screen.classList.add("active");
text.classList.add("glitch");

setTimeout(()=>{

screen.classList.remove("active");
text.classList.remove("glitch");

},9000);

}

setInterval(hackEvent,120000);

setTimeout(hackEvent,45000);

</script>

</body>
</html>
